        let dashboardLoaded = false;

        // Theme Management
        function initTheme() {
            const html = document.documentElement;
            const themeIcon = document.getElementById('theme-icon');
            const toggleBtn = document.getElementById('theme-toggle');
            
            const currentHour = new Date().getHours();
            const isNight = currentHour >= 18 || currentHour < 6;
            
            const savedTheme = localStorage.getItem('theme');
            let isDark = savedTheme === 'dark' || (!savedTheme && isNight);

            const applyTheme = (dark) => {
                if (dark) {
                    html.classList.add('dark');
                    themeIcon.setAttribute('data-lucide', 'sun');
                } else {
                    html.classList.remove('dark');
                    themeIcon.setAttribute('data-lucide', 'moon');
                }
                lucide.createIcons();
            };

            applyTheme(isDark);

            toggleBtn.addEventListener('click', () => {
                isDark = !isDark;
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                applyTheme(isDark);
            });
        }

        // Tab Navigation
        window.switchTab = function(tabName) {
            const vProv = document.getElementById('view-provincial');
            const vDash = document.getElementById('view-dashboard');
            const tProv = document.getElementById('tab-provincial');
            const tDash = document.getElementById('tab-dashboard');

            if(tabName === 'provincial') {
                vProv.classList.remove('hidden');
                vDash.classList.add('hidden');
                tProv.className = "tab-active pb-3 px-4 transition-colors";
                tDash.className = "text-gray-500 dark:text-gray-400 pb-3 px-4 hover:text-blue-500 transition-colors";
            } else {
                vProv.classList.add('hidden');
                vDash.classList.remove('hidden');
                tDash.className = "tab-active pb-3 px-4 transition-colors";
                tProv.className = "text-gray-500 dark:text-gray-400 pb-3 px-4 hover:text-blue-500 transition-colors";
                
                if(!dashboardLoaded) fetchDashboardData();
            }
        }

        // Helpers
        function getAqiInfo(aqi) {
            if (aqi <= 50) return { status: "คุณภาพอากาศดี", color: "bg-green-500", textCol: "text-green-500", bgCol: "bg-green-100 dark:bg-green-900/30", advice: "อากาศดีเยี่ยม เหมาะสำหรับการทำกิจกรรมกลางแจ้งทุกประเภท" };
            if (aqi <= 100) return { status: "คุณภาพปานกลาง", color: "bg-yellow-500", textCol: "text-yellow-600 dark:text-yellow-400", bgCol: "bg-yellow-100 dark:bg-yellow-900/30", advice: "ผู้ที่ไวต่อมลพิษอาจมีอาการเล็กน้อย ควรลดระยะเวลาทำกิจกรรมกลางแจ้ง" };
            if (aqi <= 150) return { status: "เริ่มมีผลกระทบ", color: "bg-orange-500", textCol: "text-orange-500", bgCol: "bg-orange-100 dark:bg-orange-900/30", advice: "เด็ก ผู้สูงอายุ และผู้มีโรคประจำตัว ควรลดกิจกรรมกลางแจ้ง" };
            if (aqi <= 200) return { status: "มีผลกระทบต่อสุขภาพ", color: "bg-red-500", textCol: "text-red-500", bgCol: "bg-red-100 dark:bg-red-900/30", advice: "ทุกคนควรหลีกเลี่ยงกิจกรรมกลางแจ้งเป็นเวลานาน ควรสวมหน้ากากอนามัย" };
            if (aqi <= 300) return { status: "มีผลกระทบมาก", color: "bg-purple-600", textCol: "text-purple-500", bgCol: "bg-purple-100 dark:bg-purple-900/30", advice: "อันตราย หลีกเลี่ยงกิจกรรมกลางแจ้งทุกชนิด ให้อยู่ภายในอาคาร" };
            return { status: "อันตรายระดับวิกฤต", color: "bg-rose-900", textCol: "text-rose-600", bgCol: "bg-rose-200 dark:bg-rose-900/50", advice: "อันตรายสูงสุด! ห้ามออกนอกอาคารโดยเด็ดขาด" };
        }

        function getWeatherInfo(code) {
            const map = {
                0: { text: "ฟ้าใส", icon: "sun" },
                1: { text: "มีเมฆบางส่วน", icon: "cloud-sun" },
                2: { text: "มีเมฆส่วนมาก", icon: "cloud" },
                3: { text: "มืดครึ้ม", icon: "cloud" },
                45: { text: "มีหมอก", icon: "cloud-fog" }, 48: { text: "มีหมอกหนา", icon: "cloud-fog" },
                51: { text: "ฝนปรอยๆ", icon: "cloud-drizzle" }, 61: { text: "ฝนตกเล็กน้อย", icon: "cloud-rain" },
                63: { text: "ฝนตกปานกลาง", icon: "cloud-rain" }, 65: { text: "ฝนตกหนัก", icon: "cloud-rain" },
                80: { text: "ฝนตกเป็นหย่อมๆ", icon: "cloud-rain" }, 95: { text: "พายุฝนฟ้าคะนอง", icon: "cloud-lightning" }
            };
            return map[code] || { text: "สภาพอากาศ", icon: "cloud" };
        }

        // Init App
        function init() {
            initTheme();
            lucide.createIcons();

            const select = document.getElementById('province-select');
            provinces.forEach((prov, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = prov.name;
                select.appendChild(option);
            });

            select.addEventListener('change', (e) => {
                const p = provinces[e.target.value];
                fetchProvinceData(p.lat, p.lon);
            });

            fetchProvinceData(provinces[0].lat, provinces[0].lon); // Load BKK first
        }

        // Fetch Single Province
        async function fetchProvinceData(lat, lon) {
            document.getElementById('loading-prov').classList.remove('hidden');
            document.getElementById('content-prov').classList.add('hidden');

            try {
                // Get AQI
                const aqiRes = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=pm2_5,us_aqi&timezone=Asia%2FBangkok`);
                // Get Weather + Precipitation Probability (from daily forecast as current doesn't have prob)
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code&daily=precipitation_probability_max&timezone=Asia%2FBangkok&forecast_days=1`);
                
                const aqiData = await aqiRes.json();
                const weatherData = await weatherRes.json();

                updateProvincialUI(aqiData.current, weatherData.current, weatherData.daily);
            } catch (error) {
                console.error(error);
            }
        }

        function updateProvincialUI(aqiCurrent, weatherCurrent, weatherDaily) {
            // Update AQI
            const aqiValue = aqiCurrent.us_aqi || 0;
            const aqiInfo = getAqiInfo(aqiValue);
            
            const aqiCard = document.getElementById('aqi-card');
            aqiCard.className = `rounded-2xl p-6 text-center text-white mb-6 shadow-lg transition-colors duration-500 relative overflow-hidden ${aqiInfo.color}`;
            
            document.getElementById('aqi-value').textContent = Math.round(aqiValue);
            document.getElementById('aqi-status').textContent = aqiInfo.status;
            document.getElementById('aqi-advice').textContent = aqiInfo.advice;
            document.getElementById('pm25-value').textContent = Math.round(aqiCurrent.pm2_5 || 0);

            // Update Weather
            const wInfo = getWeatherInfo(weatherCurrent.weather_code);
            const rainProb = weatherDaily.precipitation_probability_max[0] || 0;

            document.getElementById('temp-value').textContent = Math.round(weatherCurrent.temperature_2m);
            document.getElementById('humidity-value').textContent = Math.round(weatherCurrent.relative_humidity_2m);
            document.getElementById('rain-prob-value').textContent = rainProb;
            document.getElementById('weather-desc').textContent = wInfo.text;
            document.getElementById('weather-icon-container').innerHTML = `<i data-lucide="${wInfo.icon}" class="w-7 h-7 mx-auto mb-1"></i>`;
            
            document.getElementById('prov-update-time').textContent = new Date().toLocaleTimeString('th-TH');

            lucide.createIcons();
            document.getElementById('loading-prov').classList.add('hidden');
            document.getElementById('content-prov').classList.remove('hidden');
        }

        // Fetch Dashboard Data (Batch)
        window.fetchDashboardData = async function() {
            document.getElementById('loading-dash').classList.remove('hidden');
            document.getElementById('content-dash').classList.add('hidden');

            const lats = provinces.map(p => p.lat).join(',');
            const lons = provinces.map(p => p.lon).join(',');

            try {
                // Batch Request (AQI + Temp + Rain Prob)
                const aqiRes = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lats}&longitude=${lons}&current=us_aqi,pm2_5&timezone=Asia%2FBangkok`);
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&current=temperature_2m&daily=precipitation_probability_max&timezone=Asia%2FBangkok&forecast_days=1`);
                
                const aqiList = await aqiRes.json();
                const weatherList = await weatherRes.json();

                // Build Data Array
                let dashData = provinces.map((p, i) => {
                    return {
                        name: p.name,
                        aqi: aqiList[i].current.us_aqi || 0,
                        pm25: aqiList[i].current.pm2_5 || 0,
                        temp: weatherList[i].current.temperature_2m || 0,
                        rain: weatherList[i].daily.precipitation_probability_max[0] || 0
                    }
                });

                // Sorting
                const topTemp = [...dashData].sort((a, b) => b.temp - a.temp).slice(0, 5);
                const topAqi = [...dashData].sort((a, b) => b.aqi - a.aqi).slice(0, 5);
                
                // For rain, sort by rain prob, if equal, sort by highest temp to break ties
                const topRain = [...dashData].sort((a, b) => b.rain - a.rain || b.temp - a.temp).slice(0, 5);

                renderDashboard(topTemp, topAqi, topRain);
                dashboardLoaded = true;

            } catch (error) {
                console.error("Dashboard error:", error);
                document.getElementById('loading-dash').innerHTML = "<p class='text-red-500'>เกิดข้อผิดพลาดในการดึงข้อมูล กรุณาลองใหม่</p>";
            }
        }

        function renderDashboard(topTemp, topAqi, topRain) {
            const aqiListEl = document.getElementById('top-aqi-list');
            const tempListEl = document.getElementById('top-temp-list');
            const rainListEl = document.getElementById('top-rain-list');
            
            aqiListEl.innerHTML = tempListEl.innerHTML = rainListEl.innerHTML = '';

            // Render AQI List
            topAqi.forEach((item, index) => {
                const info = getAqiInfo(item.aqi);
                aqiListEl.innerHTML += `
                    <div class="flex justify-between items-center bg-white/40 dark:bg-slate-700/40 p-3 rounded-xl shadow-sm border border-gray-100 dark:border-slate-600/50 hover:scale-[1.02] transition-transform">
                        <div class="flex items-center gap-3">
                            <span class="w-7 h-7 rounded-full ${info.bgCol} ${info.textCol} flex items-center justify-center text-sm font-bold shadow-sm">${index + 1}</span>
                            <span class="font-medium text-[15px]">${item.name}</span>
                        </div>
                        <div class="text-right flex flex-col">
                            <span class="font-bold text-lg leading-none ${info.textCol}">${Math.round(item.aqi)}</span>
                            <span class="text-[10px] text-gray-500 font-semibold uppercase mt-1">PM2.5: ${Math.round(item.pm25)}</span>
                        </div>
                    </div>
                `;
            });

            // Render Temp List
            topTemp.forEach((item, index) => {
                tempListEl.innerHTML += `
                    <div class="flex justify-between items-center bg-white/40 dark:bg-slate-700/40 p-3 rounded-xl shadow-sm border border-gray-100 dark:border-slate-600/50 hover:scale-[1.02] transition-transform">
                        <div class="flex items-center gap-3">
                            <span class="w-7 h-7 rounded-full bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 flex items-center justify-center text-sm font-bold shadow-sm">${index + 1}</span>
                            <span class="font-medium text-[15px]">${item.name}</span>
                        </div>
                        <div class="text-right">
                            <span class="font-bold text-lg text-red-500">${item.temp.toFixed(1)}°</span>
                            <span class="text-[10px] text-red-400 font-semibold align-top">C</span>
                        </div>
                    </div>
                `;
            });

            // Render Rain List
            topRain.forEach((item, index) => {
                const rainColor = item.rain > 50 ? 'text-blue-600 dark:text-blue-400' : 'text-slate-500 dark:text-slate-400';
                const rainBg = item.rain > 50 ? 'bg-blue-100 dark:bg-blue-900/30' : 'bg-slate-100 dark:bg-slate-700/50';

                rainListEl.innerHTML += `
                    <div class="flex justify-between items-center bg-white/40 dark:bg-slate-700/40 p-3 rounded-xl shadow-sm border border-gray-100 dark:border-slate-600/50 hover:scale-[1.02] transition-transform">
                        <div class="flex items-center gap-3">
                            <span class="w-7 h-7 rounded-full ${rainBg} ${rainColor} flex items-center justify-center text-sm font-bold shadow-sm">${index + 1}</span>
                            <span class="font-medium text-[15px]">${item.name}</span>
                        </div>
                        <div class="text-right">
                            <span class="font-bold text-lg ${rainColor}">${item.rain}</span>
                            <span class="text-[10px] ${rainColor} font-semibold align-top">%</span>
                        </div>
                    </div>
                `;
            });

            lucide.createIcons();
            document.getElementById('loading-dash').classList.add('hidden');
            document.getElementById('content-dash').classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
